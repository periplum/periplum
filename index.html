<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Periplum map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<!-- Pin a Periplum engine version. The "Upgrade Periplum" workflow bumps this for you. -->
<script src="https://cdn.jsdelivr.net/gh/periplum/periplum@v0.1.2/dist/periplum.js"></script>
</head>
<body>
<script>
  // Edit this config, edit data.json, enable Pages — that's the whole map.
  Periplum.render({
    title: "My Periplum map",
    dataUrl: "data.json",
    repo: "https://github.com/OWNER/REPO",
    routeLabel: "Route",
    statusColors: { "first": "#1f77b4", "second": "#2ca02c" },
    seo: { description: "A chronological history map built with Periplum." },
    basemaps: [
      { id: "earth", name: "🌍 Earth", type: "tiles",
        tileUrl: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        attribution: "&copy; OpenStreetMap contributors",
        minZoom: 2, initialView: [20, 0], initialZoom: 2 }
      // Add a celestial / Moon / Mars basemap here and Periplum shows a basemap switcher.
    ]
  });
</script>
</body>
</html>

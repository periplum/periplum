name: Upgrade Periplum

# The upptime-style auto-upgrade: checks the latest Periplum engine release and,
# if newer than the version pinned in index.html, opens a PR bumping it.
# No PAT needed — the explicit permissions block + the org's "Actions may create
# PRs" setting are enough.
on:
  schedule:
    - cron: "0 6 1 * *"   # monthly check
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump pinned engine version to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api repos/periplum/periplum/tags --jq '.[0].name')
          echo "Latest Periplum tag: $latest"
          sed -i "s#periplum/periplum@v[0-9][0-9.]*#periplum/periplum@${latest}#g" index.html
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Upgrade Periplum engine"
          title: "⬆ Upgrade Periplum engine"
          body: "Bumps the pinned `periplum/periplum` engine version in index.html. CI/preview before merge."
          branch: auto/upgrade-periplum
          delete-branch: true

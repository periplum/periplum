name: Upgrade Periplum

# The upptime-style auto-upgrade: checks the latest Periplum engine release and,
# if newer than the version pinned in index.html, opens a PR bumping it.
# No PAT needed — the explicit permissions block + the org's "Actions may create
# PRs" setting are enough.
on:
  schedule:
    - cron: "0 6 1 * *"   # monthly check
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump pinned engine version + recompute SRI hash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api repos/periplum/periplum-core/tags --jq '.[0].name')
          echo "Latest Periplum tag: $latest"
          # Bump the @version in the CDN URL.
          sed -i "s#periplum/periplum-core@v[0-9][0-9.]*#periplum/periplum-core@${latest}#g" index.html
          # Recompute the Subresource Integrity hash for the new version so the
          # pinned hash never goes stale (a stale hash would block the script).
          url="https://cdn.jsdelivr.net/gh/periplum/periplum-core@${latest}/dist/periplum.js"
          hash="sha384-$(curl -fsSL "$url" | openssl dgst -sha384 -binary | openssl base64 -A)"
          echo "New SRI: $hash"
          sed -i -E "s#(periplum-core@${latest}/dist/periplum\.js\" integrity=\")[^\"]*#\1${hash}#g" index.html
          grep -n "periplum-core@" index.html
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Upgrade Periplum engine"
          title: "⬆ Upgrade Periplum engine"
          body: "Bumps the pinned `periplum/periplum` engine version in index.html. CI/preview before merge."
          branch: auto/upgrade-periplum
          delete-branch: true
